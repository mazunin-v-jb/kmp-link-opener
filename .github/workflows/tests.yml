name: Tests

# Cheap signal: run all unit tests on every push/PR to main, Linux only.
# Explicit task list (not `check`) because `check` pulls in Android Lint,
# which currently crashes with NegativeArraySizeException on the codebase
# after the Stage 09 Android target landed — tracked separately, unrelated
# to test correctness.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
      - name: Run unit tests
        run: >-
          ./gradlew
          :shared:jvmTest
          :shared:testDebugUnitTest
          :desktopApp:jvmTest
          :androidApp:testDebugUnitTest
