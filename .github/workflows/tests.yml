name: Tests

# Cheap signal: run `check` (unit tests + lint) on every push/PR to main,
# Linux only — same code paths as the other targets, no need to pay 10x macOS
# for a green-tick.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
      - name: Run check
        run: ./gradlew check
