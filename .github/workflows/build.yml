name: Build

# Manual-trigger only — no automatic runs on push or PR. Tick the
# checkboxes for the OS targets you want, pick a branch in the dropdown,
# hit Run. Each ticked target spins up its own runner; unticked = skipped.
# Builds are unsigned (signed releases are still local via `stapleDmgViaKeychain`).
on:
  workflow_dispatch:
    inputs:
      build_linux:
        description: 'Build Linux DEB'
        type: boolean
        default: true
      build_macos:
        description: 'Build macOS DMG'
        type: boolean
        default: false
      build_windows:
        description: 'Build Windows MSI'
        type: boolean
        default: false
      build_android:
        description: 'Build Android APK (debug)'
        type: boolean
        default: false

jobs:
  linux:
    if: ${{ inputs.build_linux }}
    name: Linux DEB
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
      - name: Package DEB
        run: ./gradlew :desktopApp:packageDeb
      - uses: actions/upload-artifact@v4
        with:
          name: linkopener-linux-deb
          path: desktopApp/build/compose/binaries/main/deb/*.deb
          if-no-files-found: error
          retention-days: 14

  macos:
    if: ${{ inputs.build_macos }}
    name: macOS DMG
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
      - name: Package DMG
        run: ./gradlew :desktopApp:packageDmg
      - uses: actions/upload-artifact@v4
        with:
          name: linkopener-macos-dmg
          path: desktopApp/build/compose/binaries/main/dmg/*.dmg
          if-no-files-found: error
          retention-days: 14

  windows:
    if: ${{ inputs.build_windows }}
    name: Windows MSI
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
      - name: Package MSI (with HKLM patch)
        # patchMsiHklm depends on packageMsi and post-processes the MSI to
        # add HKLM browser-registration entries via patch-msi-hklm.ps1 so
        # the installer registers Link Opener as a candidate browser
        # machine-wide (not just per-user). PowerShell ships with
        # windows-latest runners.
        run: ./gradlew :desktopApp:patchMsiHklm
      - uses: actions/upload-artifact@v4
        with:
          name: linkopener-windows-msi
          path: desktopApp/build/compose/binaries/main/msi/*.msi
          if-no-files-found: error
          retention-days: 14

  android:
    if: ${{ inputs.build_android }}
    name: Android APK
    runs-on: ubuntu-latest
    # Debug APK — signed with AGP's auto-generated debug keystore. Installable
    # via `adb install` or by sideloading on a device with "unknown sources"
    # enabled. Production-grade release APK with a real keystore is a separate
    # signing setup (mirrors the unfinished macOS notarization track).
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
      - name: Assemble debug APK
        run: ./gradlew :androidApp:assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: linkopener-android-apk
          path: androidApp/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 14
